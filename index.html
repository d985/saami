<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saami</title>
    
    <link rel="icon" type="image/png" href="logo-icon.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap');

        @font-face {
            font-family: 'Latienne Swash T';
            src: url('fonts/latienne-swash-t-regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333333; min-height: 100vh; width: 100vw; display: flex; flex-direction: column; position: relative; background-color: #fef6eb; }

        header { width: 100%; height: 65px; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; z-index: 100; background-color: rgba(254, 246, 235, 0.7) !important; border-bottom: 1px solid rgba(233, 101, 88, 0.15); box-shadow: 0 4px 20px rgba(233, 101, 88, 0.05); backdrop-filter: blur(10px) !important; -webkit-backdrop-filter: blur(10px) !important; transition: box-shadow 0.3s ease, background-color 0.3s ease, border-color 0.3s ease; }

        .header-logo { display: flex; align-items: center; }
        .header-logo a, .header-center-logo a { display: flex; align-items: center; text-decoration: none; transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.25s ease, visibility 0.25s ease; }
        body.home-active .header-logo a.home-icon-link { opacity: 1; visibility: visible; pointer-events: auto; }
        .header-center-logo { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; z-index: 105; }

        @media (min-width: 769px) {
            .header-logo a:hover { transform: translateY(-4px); }
            .header-center-logo a:hover { transform: translate(0, -4px); }
        }

        .header-logo img, .header-center-logo img { height: 48px; width: auto; display: block; }

        .menu-toggle { display: flex; flex-direction: column; justify-content: space-between; width: 24px; height: 18px; background: transparent; border: none; cursor: pointer; z-index: 1000; }
        .menu-toggle span { width: 100%; height: 2px; background-color: #e96558; border-radius: 2px; transition: all 0.3s ease; }
        .menu-toggle.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; transform: translateX(-10px); }
        .menu-toggle.active span:nth-child(3) { transform: translateY(-8px) rotate(-44deg); }

        header nav { display: flex; align-items: center; }
        header nav ul { list-style: none; display: flex; position: fixed; top: 0; right: -100%; width: 320px; height: 100vh; background-color: rgba(254, 246, 235, 0.98); flex-direction: column; justify-content: center; align-items: center; gap: 3.5rem; padding: 2rem; box-shadow: -10px 0 35px rgba(0, 0, 0, 0.08); transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 999; }
        header nav ul.active { right: 0 !important; }
        header nav a { text-decoration: none; font-family: 'Latienne Swash T', Georgia, serif; color: #e96558; font-size: 1.5rem; text-transform: lowercase; letter-spacing: 0.08em; font-weight: 700; position: relative; display: inline-block; padding-bottom: 8px; transition: color 0.2s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
        header nav a:hover { color: #b83d31; transform: translateY(-3px); }
        header nav a::after { content: ''; position: absolute; bottom: -5px; left: calc(50% - 3px); width: 6px; height: 6px; background-color: #ff99b8; border-radius: 50%; transform: scale(0); transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        header nav a:hover::after { transform: scale(1); }

        section { min-height: 100vh; width: 100vw; padding: 100px 2rem 4rem 2rem; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; }
        #home { overflow: hidden; background-color: #fef6eb; display: flex; align-items: center; justify-content: center; }
        .home-canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; }
        @media (min-width: 769px) { .home-canvas-container { padding: 0 4rem 0 4rem; } }
        @media (max-width: 768px) { .home-canvas-container { padding: 0; } }
        #home-canvas { width: 100%; height: 100%; background-image: url('background.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; border-radius: 8px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1.5rem; }
        @media (min-width: 769px) { #home-canvas { padding: 85px 8rem 2rem 8rem; } }
        .canvas-title-group { z-index: 5; position: relative; width: 100%; max-width: 850px; text-align: center; display: flex; flex-direction: column; gap: 0.75rem; }
        .canvas-title { color: #ffffff; font-family: 'Josefin Sans', sans-serif; font-size: 2.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.2; text-shadow: 0 4px 14px rgba(0, 0, 0, 0.3), 0 2px 5px rgba(0, 0, 0, 0.2); }
        .canvas-subtext { color: #ffffff; font-family: 'Josefin Sans', sans-serif; font-size: 1.4rem; font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.4; opacity: 0.95; text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3), 0 1px 4px rgba(0, 0, 0, 0.2); }
        .canvas-btn { z-index: 10; position: relative; display: inline-block; text-decoration: none; font-family: 'Josefin Sans', sans-serif; color: #ffffff; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 1rem 2.5rem; background-color: rgba(254, 246, 235, 0.15); border: 2px solid rgba(254, 246, 235, 0.6); border-radius: 30px; backdrop-filter: blur(4px); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease; }
        .canvas-btn:hover { background-color: rgba(254, 246, 235, 0.35); border-color: rgba(254, 246, 235, 0.9); transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15); }
        .canvas-btn:active { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); }

        /* SCROLL BUTTON */
        .scroll-down-btn { position: fixed; bottom: 2rem; right: 2rem; width: 50px; height: 50px; background-color: rgba(254, 246, 235, 0.7); border: 1px solid rgba(233, 101, 88, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 90; box-shadow: 0 4px 15px rgba(233, 101, 88, 0.1); backdrop-filter: blur(5px); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.3s ease, box-shadow 0.3s ease; }
        .scroll-down-btn::after { content: ''; width: 10px; height: 10px; border-right: 3px solid #e96558; border-bottom: 3px solid #e96558; transform: translateY(-2px) rotate(45deg); transition: transform 0.3s ease, border-color 0.3s ease; }
        
        /* UP ARROW STATE */
        body.at-bottom .scroll-down-btn::after { transform: translateY(2px) rotate(-135deg); }
        
        .scroll-down-btn:hover { background-color: rgba(233, 101, 88, 0.1); border-color: rgba(233, 101, 88, 0.4); transform: translateY(4px); box-shadow: 0 6px 20px rgba(233, 101, 88, 0.15); }

        .container { max-width: 800px; width: 100%; text-align: center; color: #2b2b2b; padding: 2rem; background-color: rgba(254, 246, 235, 0.65); border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); }
        section h2 { font-family: 'Latienne Swash T', Georgia, serif; color: #e96558; font-size: 2.5rem; margin-bottom: 1.5rem; text-transform: lowercase; letter-spacing: 0.04em; }
        section p { font-size: 0.95rem; line-height: 1.8; color: #555555; margin-bottom: 1.5rem; }

        form { display: flex; flex-direction: column; gap: 1.25rem; max-width: 500px; margin: 0 auto; text-align: left; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        form label { font-family: 'Latienne Swash T', Georgia, serif; color: #e96558; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.05em; }
        form input, form textarea { width: 100%; padding: 0.75rem 1rem; border: 1px solid rgba(233, 101, 88, 0.3); border-radius: 6px; background-color: #ffffff; font-family: inherit; font-size: 1rem; color: #333333; transition: border-color 0.2s ease; }
        form input:focus, form textarea:focus { outline: none; border-color: #e96558; }
        form textarea { resize: vertical; min-height: 120px; }
        form button { background-color: #e96558; color: #ffffff; border: none; padding: 0.85rem 2rem; font-family: 'Latienne Swash T', Georgia, serif; font-size: 1.1rem; font-weight: 700; border-radius: 6px; cursor: pointer; align-self: flex-start; transition: background-color 0.2s ease, transform 0.1s ease; }
        form button:hover { background-color: #b83d31; }
        form button:active { transform: scale(0.98); }

        @media (max-width: 768px) {
            header { height: 80px; padding: 0 1rem; }
            .header-logo img, .header-center-logo img { height: 40px !important; }
            header nav ul { width: 75%; max-width: 300px; }
            #home-canvas { border-radius: 0; padding: 80px 1.5rem 2rem 1.5rem; gap: 1.25rem; }
            .canvas-title { font-size: 1.7rem; padding: 0 0.5rem; }
            .canvas-subtext { font-size: 1.05rem; padding: 0 0.5rem; }
            .canvas-btn { font-size: 1rem; padding: 0.85rem 2rem; }
            .scroll-down-btn { bottom: 1.5rem; right: 1.5rem; width: 44px; height: 44px; }
            .header-logo a.touch-active, header nav a.touch-active, .canvas-btn.touch-active, .scroll-down-btn.touch-active { transform: translateY(-5px) !important; }
            .header-center-logo a.touch-active { transform: translate(0, -5px) !important; }
            .scroll-down-btn.touch-active { transform: translateY(4px) !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">
            <a href="#home" class="home-icon-link"><img src="logo-icon.png" alt="Home"></a>
        </div>
        <div class="header-center-logo">
            <a href="#home" class="logo1-link"><img src="logo1.png" alt="Logo 1"></a>
        </div>
        <nav>
            <button class="menu-toggle" aria-label="Toggle Navigation menu" aria-expanded="false" aria-controls="nav-menu">
                <span></span><span></span><span></span>
            </button>
            <ul id="nav-menu">
                <li><a href="#services">services</a></li>
                <li><a href="#about">about</a></li>
                <li><a href="#contact">contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home">
        <div class="home-canvas-container">
            <div id="home-canvas">
                <div class="canvas-title-group">
                    <h1 class="canvas-title">ADULT AND PEDIATRIC SPEECH THERAPY</h1>
                    <p class="canvas-subtext">SERVING EAST LOS ANGELES AND THE SAN GABRIEL VALLEY</p>
                </div>
                <a href="#contact" class="canvas-btn">CONTACT US</a>
            </div>
        </div>
    </section>

    <button class="scroll-down-btn" aria-label="Scroll interaction button"></button>

    <section id="services"><div class="container"><h2>services</h2><p>Services content here...</p></div></section>
    <section id="about"><div class="container"><h2>about</h2><p>About content here...</p></div></section>
    
    <section id="contact">
        <div class="container">
            <h2>contact</h2>
            <form action="#" method="POST">
                <div class="form-group"><label for="name">name</label><input type="text" id="name" name="name" required></div>
                <div class="form-group"><label for="email">email</label><input type="email" id="email" name="email" required></div>
                <div class="form-group"><label for="message">message</label><textarea id="message" name="message" required></textarea></div>
                <button type="submit">submit</button>
            </form>
        </div>
    </section>

    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const navMenu = document.getElementById('nav-menu');
        const navLinks = document.querySelectorAll('#nav-menu a');
        const scrollBtn = document.querySelector('.scroll-down-btn');
        const sections = Array.from(document.querySelectorAll('section'));
        const homeSection = document.getElementById('home');

        // Toggle Menu
        function toggleMenu() {
            const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true';
            menuToggle.setAttribute('aria-expanded', !isExpanded);
            menuToggle.classList.toggle('active');
            navMenu.classList.toggle('active');
        }
        menuToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });

        // Scroll Logic with Up/Down state
        scrollBtn.addEventListener('click', () => {
            if (document.body.classList.contains('at-bottom')) {
                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                // Scroll to next section
                const nextSection = sections.find(section => section.offsetTop > (window.scrollY + 15));
                if (nextSection) nextSection.scrollIntoView({ behavior: 'smooth' });
            }
        });

        // Scroll listener for state tracking
        window.addEventListener('scroll', () => {
            // Header scroll state
            if (window.scrollY > 20) document.body.classList.add('scrolled');
            else document.body.classList.remove('scrolled');

            // Bottom detection
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 25) {
                document.body.classList.add('at-bottom');
            } else {
                document.body.classList.remove('at-bottom');
            }
        });

        // Intersection Observer for home active state
        const homeObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) document.body.classList.add('home-active');
                else document.body.classList.remove('home-active');
            });
        }, { threshold: 0.01 });
        homeObserver.observe(homeSection);

        // Mobile touch logic
        const applyMobileTouchAnimation = (elementsList) => {
            elementsList.forEach(element => {
                element.addEventListener('touchstart', () => element.classList.add('touch-active'), { passive: true });
                const clear = () => setTimeout(() => element.classList.remove('touch-active'), 200);
                element.addEventListener('touchend', clear);
                element.addEventListener('touchcancel', clear);
                element.addEventListener('click', clear);
            });
        };
        applyMobileTouchAnimation([...navLinks, ...document.querySelectorAll('.canvas-btn'), scrollBtn]);

        // Auto-close menu
        navLinks.forEach(link => link.addEventListener('click', () => {
            setTimeout(() => { menuToggle.classList.remove('active'); navMenu.classList.remove('active'); }, 200);
        }));
    </script>
</body>
</html>
